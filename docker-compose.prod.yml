services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: meridian:latest
    container_name: meridian-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3100:3000"
    volumes:
      - meridian_db:/app/db
      - meridian_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3000/login"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  meridian_db:
  meridian_uploads:
