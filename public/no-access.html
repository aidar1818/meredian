<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Нет доступа — ОсОО Меридиан</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root { --blue:#1d508c; --text:#0a0a0a; --text-2:#4a4f57; --bg:#fafafa; --border:#e6e8ec; }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Geist",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:grid;place-items:center;padding:24px}
  .card{max-width:480px;background:#fff;border:1px solid var(--border);border-radius:14px;padding:36px 32px;text-align:center;box-shadow:0 1px 2px rgba(0,0,0,.03)}
  h1{font-size:22px;font-weight:600;margin-bottom:10px}
  p{color:var(--text-2);font-size:14px;margin-bottom:24px;line-height:1.55}
  .actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
  a.btn{display:inline-block;padding:11px 18px;border-radius:10px;font-size:13.5px;font-weight:500;text-decoration:none;border:1px solid var(--border)}
  a.btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
  .icon{width:56px;height:56px;border-radius:50%;background:#fce9ec;color:#c5253a;display:grid;place-items:center;margin:0 auto 18px}
</style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <h1>У вас нет доступа к этой странице</h1>
    <p>Запросите доступ у администратора или войдите под другой учётной записью.</p>
    <div class="actions">
      <a class="btn" href="javascript:void(0)" onclick="logoutAndGo()">Выйти</a>
      <a class="btn primary" href="/login">На вход</a>
    </div>
  </div>
  <script>
    async function logoutAndGo(){
      try { await fetch('/api/auth/logout', { method:'POST', credentials:'include' }); } catch(e){}
      location.href = '/login';
    }
  </script>
</body>
</html>
