<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0a0a0a" />
<title>Вход — ОсОО Меридиан</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --white:        #ffffff;
    --bg:           #ffffff;
    --surface:      #fafafa;
    --surface-2:    #f4f5f7;
    --border:       #e6e8ec;
    --border-strong:#d4d7dd;

    --text:         #0a0a0a;
    --text-2:       #4a4f57;
    --text-3:       #8a909a;

    --blue:         #1d508c;
    --blue-hover:   #143f6d;
    --blue-pressed: #103159;
    --blue-soft:    #ecf2fa;
    --blue-line:    #bdd2e7;

    --green:        #0a7f44;
    --green-soft:   #e6f5ec;

    --red:          #c5253a;
    --red-soft:     #fce9ec;
    --red-line:     #f1c5cd;

    --amber:        #b06a00;
    --amber-soft:   #fdf2dd;
    --amber-line:   #ecd6a8;

    --radius-sm: 6px;
    --radius:    10px;
    --radius-lg: 14px;

    --f-sans: "Geist", -apple-system, BlinkMacSystemFont, sans-serif;
    --f-mono: "Geist Mono", ui-monospace, monospace;

    --safe-top:    env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    font-family: var(--f-sans);
    font-size: 16px;
    line-height: 1.5;
    color: var(--text);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    -webkit-tap-highlight-color: transparent;
  }

  ::selection { background: var(--blue); color: var(--white); }

  button { font: inherit; border: none; background: none; cursor: pointer; color: inherit; }
  input  { font: inherit; }

  /* ======================== LAYOUT ======================== */
  .page {
    min-height: 100vh;
    min-height: 100dvh;
    display: grid;
    grid-template-columns: 1fr 1fr;
  }

  /* ============ LEFT — FORM ============ */
  .pane-form {
    display: flex;
    flex-direction: column;
    padding: calc(28px + var(--safe-top)) 56px calc(28px + var(--safe-bottom));
    background: var(--white);
    position: relative;
    min-height: 100vh;
    min-height: 100dvh;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand-mark {
    height: 32px;
    display: flex;
    align-items: center;
  }
  .brand-mark img {
    height: 100%;
    width: auto;
    display: block;
  }

  .form-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 0;
  }
  .form-card {
    width: 100%;
    max-width: 380px;
  }

  .heading {
    font-size: 32px;
    line-height: 1.1;
    font-weight: 600;
    letter-spacing: -0.025em;
    color: var(--text);
    margin-bottom: 10px;
  }
  .subheading {
    color: var(--text-2);
    font-size: 15px;
    margin-bottom: 32px;
  }

  /* ----- form fields ----- */
  .field {
    display: flex;
    flex-direction: column;
    margin-bottom: 16px;
  }
  .field-label {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 7px;
  }
  .field-input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }
  .field-input {
    width: 100%;
    height: 48px;
    padding: 0 14px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    background: var(--white);
    color: var(--text);
    font-size: 16px; /* 16px чтобы iOS не зумил при фокусе */
    transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
    outline: none;
    -webkit-appearance: none;
  }
  .field-input::placeholder { color: var(--text-3); }
  .field-input:hover:not(:disabled):not(:focus) {
    border-color: #b8bcc4;
  }
  .field-input:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(29, 80, 140, 0.14);
  }
  .field-input:disabled {
    background: var(--surface);
    color: var(--text-3);
    cursor: not-allowed;
  }
  .field-input.has-error {
    border-color: var(--red);
    box-shadow: 0 0 0 3px rgba(197, 37, 58, 0.10);
  }
  .field-input[type="password"] { padding-right: 48px; }

  .field-toggle {
    position: absolute;
    right: 4px;
    width: 40px;
    height: 40px;
    display: grid;
    place-items: center;
    color: var(--text-3);
    border-radius: 7px;
    transition: color 0.15s, background 0.15s;
  }
  .field-toggle:hover { color: var(--text); background: var(--surface-2); }
  .field-toggle:focus-visible { outline: 2px solid var(--blue); outline-offset: 1px; }
  .field-toggle svg { width: 18px; height: 18px; }

  /* ----- submit button ----- */
  .submit-btn {
    width: 100%;
    height: 50px;
    background: var(--blue);
    color: var(--white);
    border-radius: var(--radius);
    font-size: 15.5px;
    font-weight: 500;
    letter-spacing: -0.005em;
    margin-top: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.15s, transform 0.05s, opacity 0.15s;
    position: relative;
  }
  .submit-btn:hover:not(:disabled) { background: var(--blue-hover); }
  .submit-btn:active:not(:disabled) { background: var(--blue-pressed); transform: translateY(0.5px); }
  .submit-btn:focus-visible { outline: 2px solid var(--blue); outline-offset: 2px; }
  .submit-btn:disabled {
    background: var(--surface-2);
    color: var(--text-3);
    cursor: not-allowed;
  }
  .submit-btn .arrow { transition: transform 0.2s; }
  .submit-btn:hover:not(:disabled) .arrow { transform: translateX(2px); }
  .submit-btn.is-loading .label,
  .submit-btn.is-loading .arrow { opacity: 0; }
  .submit-btn .spinner {
    position: absolute;
    width: 18px;
    height: 18px;
    border: 2px solid rgba(255,255,255,0.35);
    border-top-color: var(--white);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    opacity: 0;
  }
  .submit-btn.is-loading .spinner { opacity: 1; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ----- notices ----- */
  .notice {
    display: flex;
    gap: 10px;
    padding: 12px 14px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.45;
    margin-bottom: 20px;
    align-items: flex-start;
    animation: noticeIn 0.25s cubic-bezier(0.2, 0.7, 0.3, 1);
  }
  @keyframes noticeIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .notice-icon { flex-shrink: 0; width: 18px; height: 18px; margin-top: 1px; }
  .notice-body { flex: 1; }
  .notice-body strong { font-weight: 500; }

  .notice.is-error {
    background: var(--red-soft);
    color: var(--red);
    border: 1px solid var(--red-line);
  }
  .notice.is-ban {
    background: var(--amber-soft);
    color: var(--amber);
    border: 1px solid var(--amber-line);
  }
  .notice.is-ban .countdown {
    font-family: var(--f-mono);
    font-weight: 500;
    margin-top: 4px;
    display: inline-block;
    padding: 2px 6px;
    background: rgba(176, 106, 0, 0.10);
    border-radius: 4px;
    font-size: 12.5px;
  }
  .notice.is-success {
    background: var(--green-soft);
    color: var(--green);
    border: 1px solid #c1e3cf;
  }

  /* ----- shake ----- */
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-5px); }
    40%, 80% { transform: translateX(5px); }
  }
  .shake { animation: shake 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97); }

  /* ----- demo hint ----- */
  .demo-hint {
    margin-top: 16px;
    background: var(--blue-soft);
    border: 1px dashed var(--blue-line);
    border-radius: var(--radius);
    padding: 12px 14px;
    font-size: 12.5px;
    color: var(--text-2);
    line-height: 1.5;
  }
  .demo-hint strong { color: var(--blue); font-weight: 500; }
  .demo-hint code {
    font-family: var(--f-mono);
    font-size: 12px;
    background: var(--white);
    padding: 1px 6px;
    border-radius: 4px;
    border: 1px solid var(--blue-line);
    color: var(--blue);
  }
  .demo-hint .demo-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 6px;
    gap: 8px;
  }
  .demo-hint .reset-btn {
    color: var(--blue);
    font-size: 12px;
    text-decoration: underline;
    text-decoration-style: dashed;
    text-underline-offset: 3px;
    flex-shrink: 0;
  }
  .demo-hint .reset-btn:hover { color: var(--blue-hover); }

  /* ============ RIGHT — BRAND PANEL ============ */
  .pane-brand {
    background: #0a0a0a;
    color: var(--white);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    background-image:
      radial-gradient(circle at 20% 0%, rgba(29, 80, 140, 0.45) 0%, transparent 50%),
      radial-gradient(circle at 100% 100%, rgba(29, 80, 140, 0.30) 0%, transparent 50%),
      linear-gradient(180deg, #0a0a0a 0%, #111114 100%);
  }
  /* grid pattern */
  .pane-brand::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 56px 56px;
    pointer-events: none;
  }
  /* vignette */
  .pane-brand::after {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 50%, transparent 35%, rgba(0,0,0,0.55) 100%);
    pointer-events: none;
  }

  .brand-center {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 0 32px;
  }
  .brand-mark-big {
    font-size: clamp(56px, 7vw, 104px);
    line-height: 1;
    font-weight: 500;
    letter-spacing: -0.03em;
    color: var(--white);
    margin-bottom: 18px;
    background: linear-gradient(180deg, #ffffff 0%, #b8c0d8 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .brand-prefix {
    font-family: var(--f-mono);
    font-size: 12px;
    letter-spacing: 0.36em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    margin-bottom: 14px;
    display: block;
  }
  .brand-location {
    font-family: var(--f-mono);
    font-size: 12px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
    padding: 10px 22px;
    border-top: 1px solid rgba(255,255,255,0.12);
    border-bottom: 1px solid rgba(255,255,255,0.12);
    display: inline-block;
  }

  /* decorative routes svg */
  .deco-routes {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0.18;
    pointer-events: none;
    z-index: 1;
  }
  .deco-routes circle.dot {
    animation: travel 4s ease-in-out infinite;
  }
  @keyframes travel {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  /* ============ MOBILE HERO (показывается на мобиле вместо правой панели) ============ */
  .mobile-hero { display: none; }

  /* ============ RESPONSIVE — TABLET ============ */
  @media (max-width: 1100px) {
    .pane-form { padding: calc(28px + var(--safe-top)) 40px calc(28px + var(--safe-bottom)); }
  }

  /* ============ RESPONSIVE — MOBILE ============ */
  @media (max-width: 860px) {
    .page { grid-template-columns: 1fr; }
    .pane-brand { display: none; }
    .pane-form {
      padding: calc(20px + var(--safe-top)) 24px calc(24px + var(--safe-bottom));
    }
    .brand { display: none; } /* десктопный мини-логотип скрываем */

    .mobile-hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 36px 0 28px;
      border-bottom: 1px solid var(--border);
      margin: 0 -24px;
      padding-left: 24px;
      padding-right: 24px;
      position: relative;
    }
    .mobile-hero .mh-logo {
      height: 44px;
      width: auto;
      display: block;
      margin-bottom: 10px;
    }
    .mobile-hero .mh-loc {
      font-family: var(--f-mono);
      font-size: 10.5px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-3);
    }
    .form-wrap { padding: 12px 0 32px; }
    .heading { font-size: 28px; }
  }

  /* ============ RESPONSIVE — SMALL PHONE ============ */
  @media (max-width: 380px) {
    .pane-form { padding: calc(16px + var(--safe-top)) 18px calc(20px + var(--safe-bottom)); }
    .heading { font-size: 26px; }
    .subheading { font-size: 14.5px; }
    .mobile-hero { margin-left: -18px; margin-right: -18px; padding-left: 18px; padding-right: 18px; }
    .mobile-hero .mh-logo { height: 38px; }
  }

  /* entrance */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .form-card > * { animation: fadeUp 0.5s both; }
  .form-card > *:nth-child(1) { animation-delay: 0.05s; }
  .form-card > *:nth-child(2) { animation-delay: 0.10s; }
  .form-card > *:nth-child(3) { animation-delay: 0.15s; }
  .form-card > *:nth-child(4) { animation-delay: 0.20s; }
  .form-card > *:nth-child(5) { animation-delay: 0.25s; }
  .form-card > *:nth-child(6) { animation-delay: 0.30s; }
  .form-card > *:nth-child(7) { animation-delay: 0.35s; }

</style>
</head>

  <!-- ============ RIGHT — BRAND PANEL ============ -->
  <div class="pane-brand">

    <svg class="deco-routes" viewBox="0 0 600 600" preserveAspectRatio="xMidYMid slice" fill="none">
      <path d="M50 120 L180 120 L240 180 L380 180 L470 260" stroke="rgba(255,255,255,0.4)" stroke-width="1.4" stroke-dasharray="4 6"/>
      <path d="M70 460 L180 460 L260 380 L420 380 L530 440" stroke="rgba(255,255,255,0.4)" stroke-width="1.4" stroke-dasharray="4 6"/>
      <path d="M30 300 L570 300" stroke="rgba(255,255,255,0.2)" stroke-width="1" stroke-dasharray="2 8"/>
      <circle cx="50"  cy="120" r="4" fill="#6e87f0"/>
      <circle cx="470" cy="260" r="4" fill="#6e87f0"/>
      <circle cx="70"  cy="460" r="4" fill="#6e87f0"/>
      <circle cx="530" cy="440" r="4" fill="#6e87f0"/>
      <circle class="dot" cx="240" cy="180" r="5" fill="#ffffff"/>
      <circle class="dot" cx="260" cy="380" r="5" fill="#ffffff" style="animation-delay: 1.2s"/>
    </svg>

    <div class="brand-center">
      <div class="brand-prefix">ОсОО</div>
      <div class="brand-mark-big">МЕРИДИАН</div>
      <div class="brand-location">Таможенный представитель</div>
    </div>

  </div>

</div>

<script>
  // ============ STATE ============
  // Реальная аутентификация через POST /api/auth/login.
  // Счётчик попыток и бан — серверные (ip_bans), здесь только отображение.
  const MAX_ATTEMPTS = 10;

  const state = {
    failedAttempts: 0,
    banUntil: null,
    banTickerId: null,
  };

  // ============ ELEMENTS ============
  const form = document.getElementById('loginForm');
  const loginInput = document.getElementById('login');
  const passwordInput = document.getElementById('password');
  const submitBtn = document.getElementById('submitBtn');
  const togglePasswordBtn = document.getElementById('togglePassword');
  const eyeIcon = document.getElementById('eyeIcon');
  const noticeEl = document.getElementById('notice');
  const attemptsCounterEl = document.getElementById('attemptsCounter');
  const resetBtn = document.getElementById('resetBtn');

  // ============ FORM VALIDITY ============
  function updateSubmitState() {
    const ok = loginInput.value.trim() && passwordInput.value.trim() && !isBanned();
    submitBtn.disabled = !ok;
  }

  loginInput.addEventListener('input', () => {
    loginInput.classList.remove('has-error');
    updateSubmitState();
  });
  passwordInput.addEventListener('input', () => {
    passwordInput.classList.remove('has-error');
    updateSubmitState();
  });

  // ============ PASSWORD TOGGLE ============
  togglePasswordBtn.addEventListener('click', () => {
    const isPwd = passwordInput.type === 'password';
    passwordInput.type = isPwd ? 'text' : 'password';
    togglePasswordBtn.setAttribute('aria-label', isPwd ? 'Скрыть пароль' : 'Показать пароль');
    if (isPwd) {
      eyeIcon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
    } else {
      eyeIcon.innerHTML = '<path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/>';
    }
  });

  // ============ BAN STATE ============
  function isBanned() { return state.banUntil && Date.now() < state.banUntil; }
  function getBanMinutesLeft() {
    if (!isBanned()) return 0;
    return Math.ceil((state.banUntil - Date.now()) / 60000);
  }
  function getBanSecondsLeft() {
    if (!isBanned()) return 0;
    return Math.ceil((state.banUntil - Date.now()) / 1000);
  }

  function startBanCountdown() {
    if (state.banTickerId) clearInterval(state.banTickerId);
    state.banTickerId = setInterval(() => {
      if (!isBanned()) {
        clearInterval(state.banTickerId);
        state.banTickerId = null;
        state.failedAttempts = 0;
        clearNotice();
        loginInput.disabled = false;
        passwordInput.disabled = false;
        updateAttemptsCounter();
        updateSubmitState();
        return;
      }
      renderBanNotice();
    }, 1000);
  }

  // ============ NOTICES ============
  function clearNotice() { noticeEl.innerHTML = ''; }

  function showErrorNotice(text) {
    noticeEl.innerHTML = `
      <div class="notice is-error">
        <svg class="notice-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <div class="notice-body"><strong>${text}</strong></div>
      </div>`;
  }

  function renderBanNotice() {
    const sec = getBanSecondsLeft();
    const mm = String(Math.floor(sec / 60)).padStart(2, '0');
    const ss = String(sec % 60).padStart(2, '0');
    const min = getBanMinutesLeft();
    noticeEl.innerHTML = `
      <div class="notice is-ban">
        <svg class="notice-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <div class="notice-body">
          <strong>Слишком много попыток входа.</strong> Повторите через ${min} мин.
          <div class="countdown">осталось ${mm}:${ss}</div>
        </div>
      </div>`;
  }

  function showSuccessNotice(roleLabel) {
    noticeEl.innerHTML = `
      <div class="notice is-success">
        <svg class="notice-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        <div class="notice-body"><strong>Вход выполнен${roleLabel ? ' — ' + roleLabel : ''}.</strong> Перенаправляем…</div>
      </div>`;
  }

  // ============ ATTEMPTS COUNTER ============
  function updateAttemptsCounter() {
    attemptsCounterEl.textContent = `Неудачных попыток: ${state.failedAttempts} из ${MAX_ATTEMPTS}`;
  }

  resetBtn.addEventListener('click', async () => {
    try { await fetch('/api/auth/_reset_attempts', { method: 'POST', credentials: 'include' }); } catch (e) {}
    state.failedAttempts = 0;
    state.banUntil = null;
    if (state.banTickerId) { clearInterval(state.banTickerId); state.banTickerId = null; }
    clearNotice();
    loginInput.disabled = false;
    passwordInput.disabled = false;
    loginInput.classList.remove('has-error');
    passwordInput.classList.remove('has-error');
    updateAttemptsCounter();
    updateSubmitState();
  });

  // ============ SUBMIT ============
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (submitBtn.disabled) return;

    if (isBanned()) { renderBanNotice(); return; }

    const login = loginInput.value.trim();
    const password = passwordInput.value;

    submitBtn.classList.add('is-loading');
    submitBtn.disabled = true;
    loginInput.disabled = true;
    passwordInput.disabled = true;
    clearNotice();

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ login, password }),
      });
      const data = await res.json().catch(() => ({}));
      submitBtn.classList.remove('is-loading');

      if (res.ok) {
        state.failedAttempts = 0;
        updateAttemptsCounter();
        showSuccessNotice(data.role_name || '');
        setTimeout(() => { window.location.href = data.redirect || '/'; }, 900);
        return;
      }

      // Ban (429)
      if (res.status === 429 && data.banUntil) {
        state.banUntil = data.banUntil;
        state.failedAttempts = MAX_ATTEMPTS;
        renderBanNotice();
        startBanCountdown();
        updateAttemptsCounter();
        return;
      }

      // 401 — неверный логин/пароль (сервер дал актуальный счётчик)
      if (typeof data.attempts === 'number') state.failedAttempts = data.attempts;
      else state.failedAttempts += 1;

      loginInput.classList.add('has-error');
      passwordInput.classList.add('has-error');
      form.classList.add('shake');
      setTimeout(() => form.classList.remove('shake'), 450);

      showErrorNotice(data.error || 'Неверный логин или пароль');
      loginInput.disabled = false;
      passwordInput.disabled = false;
      updateSubmitState();
      updateAttemptsCounter();
    } catch (err) {
      submitBtn.classList.remove('is-loading');
      showErrorNotice('Не удалось связаться с сервером');
      loginInput.disabled = false;
      passwordInput.disabled = false;
      updateSubmitState();
    }
  });

  // ============ INIT ============
  updateAttemptsCounter();
  updateSubmitState();
</script>

</body>
</html>
