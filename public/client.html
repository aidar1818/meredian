<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#ffffff" />
<title>Мои заявки — ОсОО Меридиан</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --white:        #ffffff;
    --bg:           #fafafa;
    --surface:      #ffffff;
    --surface-2:    #f4f5f7;
    --border:       #e6e8ec;
    --border-strong:#d4d7dd;

    --text:         #0a0a0a;
    --text-2:       #4a4f57;
    --text-3:       #8a909a;

    --blue:         #1d508c;
    --blue-soft:    #ecf2fa;
    --blue-line:    #bdd2e7;

    --green:        #0a7f44;
    --green-soft:   #e6f5ec;
    --green-line:   #c1e3cf;

    --red:          #c5253a;
    --red-strong:   #a51b2d;
    --red-soft:     #fce9ec;
    --red-line:     #f1c5cd;

    --radius-sm: 6px;
    --radius:    10px;
    --radius-lg: 14px;

    --shadow:    0 1px 3px rgba(15,20,30,0.06), 0 6px 16px rgba(15,20,30,0.05);
    --shadow-lg: 0 10px 40px rgba(15,20,30,0.12);

    --f-sans: "Geist", "PingFang SC", "Microsoft YaHei", "Noto Sans SC", -apple-system, BlinkMacSystemFont, sans-serif;
    --f-mono: "Geist Mono", ui-monospace, "PingFang SC", monospace;

    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--f-sans);
    font-size: 15px;
    line-height: 1.5;
    color: var(--text);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    -webkit-tap-highlight-color: transparent;
  }
  ::selection { background: var(--blue); color: var(--white); }
  button { font: inherit; border: none; background: none; cursor: pointer; color: inherit; }

  /* HEADER */
  .app-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 30;
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-mark {
    height: 36px;
    display: flex;
    align-items: center;
    flex-shrink: 0;
  }
  .brand-mark img {
    height: 100%;
    width: auto;
    display: block;
  }
  .brand-divider {
    width: 1px;
    height: 28px;
    background: var(--border);
    flex-shrink: 0;
  }
  .brand-name { font-size: 14.5px; font-weight: 500; letter-spacing: -0.01em; }
  .brand-name span {
    margin-left: 8px; padding-left: 10px;
    border-left: 1px solid var(--border);
    color: var(--text-3); font-weight: 400;
  }

  .user-block { display: flex; align-items: center; gap: 12px; }

  /* LANGUAGE SWITCHER */
  .lang-switcher {
    display: inline-flex;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    height: 32px;
    background: var(--surface);
  }
  .lang-btn {
    padding: 0 11px;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--text-3);
    transition: all 0.15s;
    letter-spacing: 0.01em;
    min-width: 36px;
    display: grid;
    place-items: center;
  }
  .lang-btn + .lang-btn { border-left: 1px solid var(--border); }
  .lang-btn.is-active {
    background: var(--text);
    color: var(--white);
  }
  .lang-btn:not(.is-active):hover {
    background: var(--surface-2);
    color: var(--text);
  }

  .user-info { text-align: right; line-height: 1.3; }
  .user-name { font-size: 13.5px; font-weight: 500; }
  .user-role { font-size: 12px; color: var(--text-3); }
  .user-avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: var(--blue-soft); color: var(--blue);
    display: grid; place-items: center;
    font-weight: 600; font-size: 13px;
  }
  .logout-btn {
    width: 34px; height: 34px;
    border-radius: 8px;
    color: var(--text-3);
    display: grid; place-items: center;
    transition: background 0.15s, color 0.15s;
  }
  .logout-btn:hover { background: var(--surface-2); color: var(--text); }
  .logout-btn svg { width: 18px; height: 18px; }

  /* MAIN */
  .app-main {
    max-width: 1280px;
    margin: 0 auto;
    padding: 32px;
  }
  .page-header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .page-header-text { flex: 1; min-width: 200px; }
  .page-header h1 {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.025em;
    line-height: 1.1;
    margin-bottom: 6px;
  }
  .page-header .subtitle {
    color: var(--text-2);
    font-size: 14.5px;
  }

  /* BUTTONS (для клиента — нужны для новой машины) */
  .btn {
    height: 40px;
    padding: 0 16px;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 500;
    letter-spacing: -0.005em;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.05s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .btn:active:not(:disabled) { transform: translateY(0.5px); }
  .btn:focus-visible { outline: 2px solid var(--blue); outline-offset: 2px; }
  .btn:disabled { cursor: not-allowed; opacity: 0.55; }
  .btn-primary { background: var(--blue); color: var(--white); }
  .btn-primary:hover:not(:disabled) { background: var(--blue-hover, #143f6d); }
  .btn-secondary {
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border-strong);
  }
  .btn-secondary:hover:not(:disabled) { background: var(--surface-2); border-color: var(--text-3); }

  /* MODAL */
  .modal {
    position: fixed; inset: 0; z-index: 200;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none; visibility: hidden;
    padding: 20px;
  }
  .modal.is-open { pointer-events: auto; visibility: visible; }
  .modal-backdrop {
    position: absolute; inset: 0;
    background: rgba(15,20,30,0.5);
    backdrop-filter: blur(2px);
    opacity: 0; transition: opacity 0.2s;
  }
  .modal.is-open .modal-backdrop { opacity: 1; }
  .modal-card {
    position: relative;
    background: var(--surface);
    border-radius: var(--radius-lg);
    width: 100%;
    max-width: 440px;
    box-shadow: var(--shadow-lg);
    transform: scale(0.96) translateY(8px); opacity: 0;
    transition: transform 0.2s, opacity 0.2s;
  }
  .modal.is-open .modal-card { transform: scale(1) translateY(0); opacity: 1; }
  .modal-header { padding: 20px 24px 4px; }
  .modal-title { font-size: 18px; font-weight: 600; letter-spacing: -0.02em; }
  .modal-subtitle { font-size: 13.5px; color: var(--text-2); margin-top: 4px; }
  .modal-body { padding: 14px 24px 18px; }
  .modal-footer {
    padding: 14px 24px 20px;
    display: flex; gap: 8px;
    border-top: 1px solid var(--border);
    margin-top: 4px;
  }
  .modal-footer .btn { flex: 1; }
  .form-field { margin-bottom: 14px; }
  .form-field:last-child { margin-bottom: 0; }
  .form-label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 6px;
  }
  .form-label .req { color: var(--red); margin-left: 2px; }
  .form-input {
    width: 100%;
    padding: 0 12px;
    height: 42px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    background: var(--white);
    font-size: 15px;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    -webkit-appearance: none;
    font-family: inherit;
  }
  .form-input:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(29,80,140,0.14);
  }
  .form-input.has-error {
    border-color: var(--red);
    box-shadow: 0 0 0 3px rgba(197,37,58,0.10);
  }
  .form-input.mono { font-family: var(--f-mono); }
  .form-error { color: var(--red); font-size: 12.5px; margin-top: 6px; }
  .form-help  { color: var(--text-3); font-size: 12.5px; margin-top: 6px; }

  /* TOAST */
  .toast-stack {
    position: fixed;
    bottom: calc(20px + var(--safe-bottom));
    right: 20px;
    z-index: 300;
    display: flex; flex-direction: column; gap: 8px;
    pointer-events: none;
  }
  .toast {
    background: var(--text);
    color: var(--white);
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 13.5px;
    box-shadow: var(--shadow-lg);
    animation: toastIn 0.25s cubic-bezier(0.2, 0.7, 0.3, 1), toastOut 0.3s 3.5s forwards;
    max-width: 320px;
  }
  .toast.success { background: var(--green); }
  .toast.error   { background: var(--red); }
  @keyframes toastIn  { from { transform: translateX(20px); opacity: 0; } }
  @keyframes toastOut { to   { transform: translateX(20px); opacity: 0; } }

  /* PILLS */
  .pills-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 18px;
  }
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    border-radius: 999px;
    background: var(--surface);
    border: 1px solid var(--border);
    font-size: 13px;
    font-weight: 500;
    color: var(--text-2);
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .pill:hover { border-color: var(--text-3); }
  .pill.is-active {
    background: var(--text);
    color: var(--white);
    border-color: var(--text);
  }
  .pill-count {
    font-family: var(--f-mono);
    font-weight: 600;
    background: var(--surface-2);
    padding: 1px 7px;
    border-radius: 999px;
    font-size: 11.5px;
    color: var(--text-2);
  }
  .pill.is-active .pill-count {
    background: rgba(255,255,255,0.18);
    color: var(--white);
  }

  /* CARDS */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 12px;
  }
  .truck-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--blue);
    border-radius: var(--radius);
    padding: 14px 16px;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s, transform 0.08s;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .truck-card:hover {
    box-shadow: var(--shadow);
    border-color: var(--border-strong);
  }
  .truck-card:hover.is-problem  { border-left-color: var(--red); }
  .truck-card:hover.is-released { border-left-color: var(--green); }
  .truck-card:active { transform: translateY(0.5px); }
  .truck-card.is-problem  { border-left-color: var(--red); }
  .truck-card.is-released { border-left-color: var(--green); }

  .card-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }
  .card-number {
    font-family: var(--f-mono);
    font-weight: 500;
    font-size: 16px;
    letter-spacing: -0.01em;
    color: var(--text);
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: -0.005em;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .badge-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
  }
  .badge-active   { background: var(--blue-soft);  color: var(--blue); }
  .badge-problem  { background: var(--red-soft);   color: var(--red); }
  .badge-released { background: var(--green-soft); color: var(--green); }
  .badge-problem .badge-dot { animation: pulseDot 1.6s ease-in-out infinite; }
  @keyframes pulseDot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  .card-stage-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
  }
  .card-stage-name {
    font-size: 14.5px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.3;
  }
  .truck-card.is-problem  .card-stage-name { color: var(--red-strong); }
  .truck-card.is-released .card-stage-name { color: var(--text-2); }
  .card-percent {
    font-family: var(--f-mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--blue);
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }
  .truck-card.is-problem  .card-percent { color: var(--red); }
  .truck-card.is-released .card-percent { color: var(--green); }

  .card-mini-progress {
    display: flex;
    align-items: center;
    gap: 0;
    margin-top: -4px;
  }
  .mini-stage {
    width: 14px; height: 14px;
    display: grid; place-items: center;
    flex-shrink: 0;
  }
  .mini-stage::after {
    content: "";
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--surface-2);
    border: 1.5px solid var(--border-strong);
    transition: all 0.2s;
  }
  .mini-stage.done::after         { background: var(--blue);  border-color: var(--blue); }
  .mini-stage.released-dot::after { background: var(--green); border-color: var(--green); }
  .mini-stage.current::after {
    background: var(--blue); border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(29,80,140,0.18);
    width: 8px; height: 8px;
  }
  .mini-stage.problem::after {
    background: var(--red); border-color: var(--red);
    box-shadow: 0 0 0 3px rgba(197,37,58,0.18);
    width: 8px; height: 8px;
  }
  .mini-stage-line {
    flex: 1;
    height: 2px;
    background: var(--border);
    min-width: 6px;
  }
  .mini-stage-line.done           { background: var(--blue); }
  .mini-stage-line.released-line  { background: var(--green); }

  .card-times {
    display: grid;
    grid-template-columns: 1fr 1px 1fr;
    gap: 12px;
    background: var(--surface-2);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
  }
  .time-cell { min-width: 0; }
  .time-label {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 10.5px;
    color: var(--text-3);
    font-weight: 500;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    margin-bottom: 3px;
  }
  .time-label svg { width: 10px; height: 10px; flex-shrink: 0; }
  .time-value {
    font-family: var(--f-mono);
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    line-height: 1.1;
    letter-spacing: -0.01em;
  }
  .truck-card.is-problem .time-value.current { color: var(--red); }
  .truck-card.is-released .time-value { color: var(--text-2); font-size: 13px; font-weight: 500; }
  .time-divider { background: var(--border); width: 1px; }

  .empty-state {
    grid-column: 1 / -1;
    padding: 48px 20px;
    text-align: center;
    color: var(--text-3);
    background: var(--surface);
    border: 1px dashed var(--border-strong);
    border-radius: var(--radius);
  }
  .empty-state-icon { margin-bottom: 12px; opacity: 0.5; }
  .empty-state h3 { font-size: 16px; color: var(--text-2); margin-bottom: 4px; }

  /* SLIDE-OVER */
  .slide-over {
    position: fixed; inset: 0; z-index: 100;
    display: flex; justify-content: flex-end;
    pointer-events: none; visibility: hidden;
  }
  .slide-over.is-open { pointer-events: auto; visibility: visible; }
  .slide-backdrop {
    position: absolute; inset: 0;
    background: rgba(15,20,30,0.4);
    backdrop-filter: blur(2px);
    opacity: 0; transition: opacity 0.25s;
  }
  .slide-over.is-open .slide-backdrop { opacity: 1; }
  .slide-content {
    position: relative;
    width: 540px;
    max-width: 100%;
    background: var(--surface);
    height: 100%;
    overflow-y: auto;
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    box-shadow: var(--shadow-lg);
  }
  .slide-over.is-open .slide-content { transform: translateX(0); }

  .slide-header {
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    position: sticky; top: 0;
    background: var(--surface);
    z-index: 2;
  }
  .slide-title-block { flex: 1; min-width: 0; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .slide-title {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.02em;
    font-family: var(--f-mono);
  }
  .slide-close {
    width: 36px; height: 36px;
    border-radius: 8px;
    color: var(--text-3);
    display: grid; place-items: center;
    transition: background 0.15s, color 0.15s;
    flex-shrink: 0;
  }
  .slide-close:hover { background: var(--surface-2); color: var(--text); }

  .slide-body { padding: 22px 24px 24px; }

  .panel-section { margin-bottom: 24px; }
  .panel-section:last-child { margin-bottom: 0; }
  .panel-section-title {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-3);
    margin-bottom: 10px;
  }

  .hero-time {
    display: grid;
    grid-template-columns: 1fr 1px 1fr;
    background: var(--text);
    color: var(--white);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 16px;
  }
  .hero-time.problem  { background: var(--red); }
  .hero-time.released { background: var(--green); }
  .hero-time-cell { min-width: 0; }
  .hero-time-label {
    font-size: 10.5px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    opacity: 0.7;
    margin-bottom: 4px;
  }
  .hero-time-value {
    font-family: var(--f-mono);
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .hero-time-divider { background: rgba(255,255,255,0.18); width: 1px; margin: 4px 16px; }

  .current-stage {
    background: var(--blue-soft);
    border: 1px solid var(--blue-line);
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-bottom: 16px;
  }
  .current-stage.released { background: var(--green-soft); border-color: var(--green-line); }
  .current-stage.problem  { background: var(--red-soft);   border-color: var(--red-line); }
  .current-stage-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--blue);
    margin-bottom: 4px;
    font-weight: 600;
  }
  .current-stage.released .current-stage-label { color: var(--green); }
  .current-stage.problem  .current-stage-label { color: var(--red); }
  .current-stage-name {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
  }

  .progress-block { margin-bottom: 16px; }
  .progress-block-head {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
    font-size: 12px;
    color: var(--text-3);
    font-weight: 500;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }
  .progress-block-percent {
    font-family: var(--f-mono);
    font-weight: 600;
    color: var(--blue);
    font-variant-numeric: tabular-nums;
    font-size: 13px;
    letter-spacing: 0;
  }
  .progress-block-bar {
    height: 6px;
    background: var(--surface-2);
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-block-fill {
    height: 100%;
    background: var(--blue);
    border-radius: 999px;
    transition: width 0.3s ease;
  }
  .progress-block-fill.done    { background: var(--green); }
  .progress-block-fill.problem { background: var(--red); }

  /* timeline */
  .timeline { position: relative; padding-left: 26px; }
  .timeline::before {
    content: "";
    position: absolute;
    left: 8px;
    top: 8px; bottom: 8px;
    width: 1.5px;
    background: var(--border-strong);
  }
  .tl-item { position: relative; padding-bottom: 22px; }
  .tl-item:last-child { padding-bottom: 0; }
  .tl-dot {
    position: absolute;
    left: -26px; top: 1px;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--surface-2);
    border: 2px solid var(--border-strong);
    display: grid; place-items: center;
  }
  .tl-item.done .tl-dot     { background: var(--blue);  border-color: var(--blue); }
  .tl-item.released .tl-dot { background: var(--green); border-color: var(--green); }
  .tl-item.done .tl-dot::after,
  .tl-item.released .tl-dot::after {
    content: "";
    width: 7px; height: 4px;
    border: 1.8px solid var(--white);
    border-top: none; border-right: none;
    transform: rotate(-45deg) translate(1px, -1px);
  }
  .tl-item.current .tl-dot {
    background: var(--white);
    border-color: var(--blue);
    box-shadow: 0 0 0 4px rgba(29,80,140,0.16);
  }
  .tl-item.current .tl-dot::after {
    content: "";
    width: 6px; height: 6px;
    background: var(--blue);
    border-radius: 50%;
    animation: pulseDot 1.6s ease-in-out infinite;
  }
  .tl-item.problem .tl-dot {
    background: var(--red);
    border-color: var(--red);
    box-shadow: 0 0 0 4px rgba(197,37,58,0.16);
  }
  .tl-item.problem .tl-dot::after {
    content: "!";
    color: var(--white);
    font-weight: 700;
    font-size: 11px;
    line-height: 1;
  }

  .tl-stage-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 6px;
    line-height: 1.3;
  }
  .tl-times {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 4px 12px;
    align-items: baseline;
    font-size: 13px;
    margin-bottom: 4px;
  }
  .tl-times .label {
    font-size: 10.5px;
    color: var(--text-3);
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .tl-times .val {
    font-family: var(--f-mono);
    font-variant-numeric: tabular-nums;
    color: var(--text-2);
    font-size: 13px;
  }
  .tl-status {
    font-size: 11.5px;
    color: var(--text-3);
    font-style: italic;
    margin-bottom: 4px;
  }
  .tl-duration {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-family: var(--f-mono);
    font-size: 12px;
    background: var(--blue-soft);
    color: var(--blue);
    padding: 3px 9px;
    border-radius: 4px;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin-top: 4px;
  }
  .tl-duration svg { width: 10px; height: 10px; }
  .tl-item.problem  .tl-duration { background: var(--red-soft);   color: var(--red); }
  .tl-item.released .tl-duration { background: var(--green-soft); color: var(--green); }

  .tl-problem {
    margin-top: 8px;
    background: var(--red-soft);
    border: 1px solid var(--red-line);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-size: 13px;
    color: var(--text);
    line-height: 1.5;
  }
  .tl-problem-head {
    font-size: 10.5px;
    color: var(--red);
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .tl-problem-head svg { width: 11px; height: 11px; }
  .tl-problem-time {
    font-family: var(--f-mono);
    font-size: 11px;
    color: var(--text-3);
    margin-top: 6px;
  }

  .meta-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .meta-item {
    background: var(--surface-2);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
  }
  .meta-label {
    font-size: 10.5px;
    color: var(--text-3);
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 3px;
  }
  .meta-value {
    font-size: 13.5px;
    font-weight: 500;
    color: var(--text);
    word-break: break-word;
  }
  .meta-value.mono  { font-family: var(--f-mono); }
  .meta-value.empty { color: var(--text-3); font-weight: 400; font-style: italic; }

  .file-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface-2);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
  }
  .file-icon {
    width: 32px; height: 32px;
    border-radius: 6px;
    background: var(--blue-soft); color: var(--blue);
    display: grid; place-items: center;
    flex-shrink: 0;
  }
  .file-info { flex: 1; min-width: 0; }
  .file-name { font-size: 13px; font-weight: 500; word-break: break-all; }
  .file-meta { font-size: 11px; color: var(--text-3); }
  .file-empty {
    background: var(--surface-2);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    color: var(--text-3);
    font-size: 13px;
    font-style: italic;
  }

  /* Chinese-specific tweak — увеличиваем размер мелких подписей */
  html[lang="zh"] .time-label,
  html[lang="zh"] .panel-section-title,
  html[lang="zh"] .meta-label,
  html[lang="zh"] .hero-time-label,
  html[lang="zh"] .current-stage-label,
  html[lang="zh"] .tl-times .label,
  html[lang="zh"] .progress-block-head,
  html[lang="zh"] .tl-problem-head {
    text-transform: none;
    letter-spacing: 0;
    font-size: 11px;
  }

  /* RESPONSIVE */
  @media (max-width: 860px) {
    .app-header { padding: 0 16px; height: 56px; }
    .app-main { padding: 20px 16px 32px; }
    .page-header h1 { font-size: 24px; }
    .cards-grid { grid-template-columns: 1fr; gap: 10px; }
    .truck-card { padding: 12px 14px; }
    .brand-mark { height: 30px; }
    .brand-divider { display: none; }
    .brand-name span { display: none; }
    .user-info { display: none; }
    .slide-content { width: 100%; }
    .pills-row { gap: 6px; }
    .pill { font-size: 12.5px; padding: 7px 12px; }
    .hero-time-value { font-size: 19px; }
  }
  @media (max-width: 480px) {
    .app-header { padding: 0 12px; }
    .app-main { padding: 16px 12px 28px; }
    .meta-grid { grid-template-columns: 1fr; }
    .card-number { font-size: 15px; }
    .time-value { font-size: 14px; }
    .hero-time { padding: 14px 16px; }
    .hero-time-value { font-size: 17px; }
    .lang-btn { padding: 0 8px; min-width: 30px; font-size: 12px; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .truck-card { animation: fadeUp 0.35s both; }
  .truck-card:nth-child(1) { animation-delay: 0.04s; }
  .truck-card:nth-child(2) { animation-delay: 0.08s; }
  .truck-card:nth-child(3) { animation-delay: 0.12s; }
  .truck-card:nth-child(4) { animation-delay: 0.16s; }
  .truck-card:nth-child(5) { animation-delay: 0.20s; }
</style>
</head>

function pad(n) { return String(n).padStart(2, '0'); }

function formatDateTime(ts) {
  const d = new Date(ts);
  const today = new Date();
  const isToday = d.toDateString() === today.toDateString();
  const yest = new Date(); yest.setDate(yest.getDate() - 1);
  const isYesterday = d.toDateString() === yest.toDateString();
  const time = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
  if (currentLang === 'zh') {
    if (isToday) return `${t('time.today')} ${time}`;
    if (isYesterday) return `${t('time.yesterday')} ${time}`;
    return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 ${time}`;
  }
  if (isToday) return `${t('time.today')}, ${time}`;
  if (isYesterday) return `${t('time.yesterday')}, ${time}`;
  return `${pad(d.getDate())}.${pad(d.getMonth()+1)}.${d.getFullYear()}, ${time}`;
}

function formatDuration(ms) {
  if (ms < 0) ms = 0;
  const totalMin = Math.floor(ms / (60*1000));
  const days = Math.floor(totalMin / (60*24));
  const hours = Math.floor((totalMin % (60*24)) / 60);
  const mins = totalMin % 60;

  if (currentLang === 'zh') {
    if (ms < 60*1000) return `${Math.floor(ms/1000)}秒`;
    if (days > 0)  return `${days}天${hours}小时`;
    if (hours > 0) return `${hours}小时${mins}分`;
    return `${mins}分`;
  }
  if (ms < 60*1000) return `${Math.floor(ms/1000)}с`;
  if (days > 0)  return `${days}д ${hours}ч`;
  if (hours > 0) return `${hours}ч ${mins}м`;
  return `${mins}м`;
}

function getCurrentStageEntry(t) { return t.stageHistory.find(s => s.exitedAt === null); }
function getStageDuration(s) { const exit = s.exitedAt ?? Date.now(); return exit - s.enteredAt; }
function getTotalDuration(t) {
  if (t.isReleased && t.releasedAt) return t.releasedAt - t.createdAt;
  return Date.now() - t.createdAt;
}
function getProgressPercent(t) {
  if (t.isReleased) return 100;
  return Math.round((t.currentStageIndex / (TOTAL_STAGES - 1)) * 100);
}
function hasActiveProblem(t) {
  if (t.isReleased) return false;
  return t.problems.some(p => p.stageIndex === t.currentStageIndex);
}
function getProblemReason(p) {
  if (p.reasonByLang) return p.reasonByLang[currentLang] || p.reasonByLang.ru;
  return p.reason || '';
}

function renderMiniProgress(tr) {
  let html = '<div class="card-mini-progress">';
  for (let i = 0; i < TOTAL_STAGES; i++) {
    let cls = '';
    if (tr.isReleased)                      cls = 'released-dot';
    else if (i < tr.currentStageIndex)      cls = 'done';
    else if (i === tr.currentStageIndex)    cls = hasActiveProblem(tr) ? 'problem' : 'current';
    html += `<div class="mini-stage ${cls}"></div>`;
    if (i < TOTAL_STAGES - 1) {
      let lineCls = '';
      if (tr.isReleased)                    lineCls = 'released-line';
      else if (i < tr.currentStageIndex)    lineCls = 'done';
      html += `<div class="mini-stage-line ${lineCls}"></div>`;
    }
  }
  html += '</div>';
  return html;
}

// CARD
// ============================================================
function renderCard(tr) {
  const stages = STAGES();
  const stageInfo = stages[tr.currentStageIndex];
  const cur = getCurrentStageEntry(tr);
  const percent = getProgressPercent(tr);
  const totalTime = formatDuration(getTotalDuration(tr));
  const isProblem = hasActiveProblem(tr);

  let badge;
  if (tr.isReleased) {
    badge = `<span class="badge badge-released"><span class="badge-dot"></span>${t('status.released')}</span>`;
  } else if (isProblem) {
    badge = `<span class="badge badge-problem"><span class="badge-dot"></span>${t('status.problem')}</span>`;
  } else {
    badge = `<span class="badge badge-active"><span class="badge-dot"></span>${t('status.active')}</span>`;
  }

  const cardClass =
    tr.isReleased ? 'is-released' :
    isProblem     ? 'is-problem'  : 'is-active';

  let timeLeftLabel, timeLeftValue, timeLeftClass = '';
  if (tr.isReleased) {
    timeLeftLabel = t('card.completed');
    timeLeftValue = formatDateTime(tr.releasedAt);
  } else {
    timeLeftLabel = t('card.onStage');
    timeLeftValue = cur ? formatDuration(getStageDuration(cur)) : '—';
    if (isProblem) timeLeftClass = 'current';
  }

  return `
    <div class="truck-card ${cardClass}" data-truck-id="${tr.id}">
      <div class="card-head">
        <div class="card-number">${tr.number}</div>
        ${badge}
      </div>
      <div class="card-stage-row">
        <div class="card-stage-name">${stageInfo.label}</div>
        <div class="card-percent">${percent}%</div>
      </div>
      ${renderMiniProgress(tr)}
      <div class="card-times">
        <div class="time-cell">
          <div class="time-label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            ${timeLeftLabel}
          </div>
          <div class="time-value ${timeLeftClass}">${timeLeftValue}</div>
        </div>
        <div class="time-divider"></div>
        <div class="time-cell">
          <div class="time-label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            ${t('card.total')}
          </div>
          <div class="time-value">${totalTime}</div>
        </div>
      </div>
    </div>`;
}

// GRID

function renderGrid() {
  const grid = document.getElementById('cardsGrid');
  let filtered = [...trucks];
  if (activeFilter === 'active')   filtered = filtered.filter(t => !t.isReleased);
  if (activeFilter === 'released') filtered = filtered.filter(t => t.isReleased);

  filtered.sort((a, b) => {
    if (a.isReleased !== b.isReleased) return a.isReleased ? 1 : -1;
    const ap = hasActiveProblem(a), bp = hasActiveProblem(b);
    if (ap !== bp) return ap ? -1 : 1;
    return b.createdAt - a.createdAt;
  });

  if (filtered.length === 0) {
    let msg = t('empty.all');
    if (activeFilter === 'active')   msg = t('empty.active');
    if (activeFilter === 'released') msg = t('empty.released');
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
          </svg>
        </div>
        <h3>${t('empty.title')}</h3>
        <p>${msg}</p>
      </div>`;
    return;
  }
  grid.innerHTML = filtered.map(renderCard).join('');
}

function renderTimeline(tr) {
  const stages = STAGES();
  let html = '<div class="timeline">';
  for (let i = 0; i < TOTAL_STAGES; i++) {
    const stage = stages[i];
    const entry = tr.stageHistory.find(s => s.stageIndex === i);
    const stageProblems = tr.problems.filter(p => p.stageIndex === i);

    let cls = '';
    let times = '';
    let durBlock = '';
    let statusText = t('tl.waiting');

    if (tr.isReleased && i === 9) {
      cls = 'released';
      statusText = '';
      if (entry) {
        times = `<div class="tl-times">
          <span class="label">${t('tl.released')}</span><span class="val">${formatDateTime(entry.enteredAt)}</span>
        </div>`;
      }
    } else if (entry && entry.exitedAt !== null) {
      cls = 'done';
      statusText = '';
      const dur = formatDuration(entry.exitedAt - entry.enteredAt);
      times = `<div class="tl-times">
        <span class="label">${t('tl.start')}</span><span class="val">${formatDateTime(entry.enteredAt)}</span>
        <span class="label">${t('tl.end')}</span><span class="val">${formatDateTime(entry.exitedAt)}</span>
      </div>`;
      durBlock = `<div class="tl-duration"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${dur}</div>`;
    } else if (entry && entry.exitedAt === null && !tr.isReleased) {
      const hasProb = stageProblems.length > 0;
      cls = hasProb ? 'problem' : 'current';
      statusText = hasProb ? t('tl.problemAt') : t('tl.current');
      const dur = formatDuration(Date.now() - entry.enteredAt);
      times = `<div class="tl-times">
        <span class="label">${t('tl.start')}</span><span class="val">${formatDateTime(entry.enteredAt)}</span>
      </div>`;
      durBlock = `<div class="tl-duration"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${dur}</div>`;
    }

    let problemBlock = '';
    if (stageProblems.length > 0) {
      problemBlock = stageProblems.map(p => `
        <div class="tl-problem">
          <div class="tl-problem-head">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            ${t('tl.problem')}
          </div>
          ${getProblemReason(p)}
          <div class="tl-problem-time">${t('tl.fixedAt')}: ${formatDateTime(p.reportedAt)}</div>
        </div>`).join('');
    }

    html += `
      <div class="tl-item ${cls}">
        <div class="tl-dot"></div>
        <div class="tl-stage-name">${i+1}. ${stage.label}</div>
        ${statusText ? `<div class="tl-status">${statusText}</div>` : ''}
        ${times}
        ${durBlock}
        ${problemBlock}
      </div>`;
  }
  html += '</div>';
  return html;
}

        <div class="meta-label">${t('meta.released')}</div>
        <div class="meta-value">${formatDateTime(tr.releasedAt)}</div>
      </div>` : ''}
      <div class="meta-item">
        <div class="meta-label">${t('meta.goods')}</div>
        <div class="meta-value ${tr.goodsCount != null ? 'mono' : 'empty'}">${tr.goodsCount != null ? `${tr.goodsCount} ${t('unit.pcs')}` : t('meta.notSpec')}</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">${currentLang === 'zh' ? '重量' : 'Вес'}</div>
        <div class="meta-value ${tr.weight != null ? 'mono' : 'empty'}">${tr.weight != null ? `${tr.weight} ${currentLang === 'zh' ? '公斤' : 'кг'}` : t('meta.notSpec')}</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">${currentLang === 'zh' ? '金额' : 'Сумма'}</div>
        <div class="meta-value ${tr.sumAmount != null ? 'mono' : 'empty'}">${tr.sumAmount != null ? `${tr.sumAmount} ${currentLang === 'zh' ? '索姆' : 'сом'}` : t('meta.notSpec')}</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">${t('meta.number')}</div>
        <div class="meta-value mono">${tr.number}</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">${t('meta.customs')}</div>
        <div class="meta-value">${tr.customs || '—'}</div>
      </div>
    </div>`;

  // ===== Prelim info block (read-only) =====
  let prelimSection = '';
  const showPrelim = tr.currentStageIndex >= 1 || !!tr.prelimInfoFile;
  if (showPrelim) {
    const prelimContent = tr.prelimInfoFile
      ? `<a class="file-row" href="/api/trucks/${encodeURIComponent(tr.id)}/prelim-file/download" style="text-decoration:none;color:inherit;display:flex;">
          <div class="file-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
            </svg>
          </div>
          <div class="file-info">
            <div class="file-name">${tr.prelimInfoFile}</div>
            <div class="file-meta">${t('file.uploaded')}</div>
          </div>
        </a>`
      : `<div class="file-empty">${t('file.prelimEmpty')}</div>`;
    prelimSection = `
      <div class="panel-section">
        <div class="panel-section-title">${t('detail.section.prelim')}</div>
        ${prelimContent}
      </div>`;
  }

  const fileBlock = tr.declarationFile
    ? `<a class="file-row" href="/api/trucks/${encodeURIComponent(tr.id)}/declaration/download" style="text-decoration:none;color:inherit;display:flex;">
        <div class="file-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
        </div>
        <div class="file-info">
          <div class="file-name">${tr.declarationFile}</div>
          <div class="file-meta">${t('file.uploaded')}</div>
        </div>
      </a>`
    : `<div class="file-empty">${t('file.empty')}</div>`;

  const timeline = renderTimeline(tr);

  document.getElementById('detailContent').innerHTML = `
    <div class="slide-header">
      <div class="slide-title-block">
        <div class="slide-title">${tr.number}</div>
        ${badge}
      </div>
      <button class="slide-close" data-close>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="slide-body">
      ${heroTime}
      ${csCard}
      ${progressBlock}
      <div class="panel-section">
        <div class="panel-section-title">${t('detail.section.info')}</div>
        ${metaGrid}
      </div>
      ${prelimSection}
      <div class="panel-section">
        <div class="panel-section-title">${t('detail.section.declaration')}</div>
        ${fileBlock}
      </div>
      <div class="panel-section">
        <div class="panel-section-title">${t('detail.section.timeline')}</div>
        ${timeline}
      </div>
    </div>`;
}

// ============================================================
// HANDLERS
// ============================================================
function openDetail(id) {
  activeTruckId = id;
  renderDetail();
  document.getElementById('detailPanel').classList.add('is-open');
  document.body.style.overflow = 'hidden';
}
function closeDetail() {
  document.getElementById('detailPanel').classList.remove('is-open');
  document.body.style.overflow = '';
  activeTruckId = null;
}

document.addEventListener('click', e => {
  const card = e.target.closest('.truck-card');
  if (card) openDetail(card.dataset.truckId);
  if (e.target.matches('[data-close]') || e.target.closest('[data-close]')) closeDetail();
});

document.querySelectorAll('.pill').forEach(pill => {
  pill.addEventListener('click', () => {
    activeFilter = pill.dataset.filter;
    renderPills();
    renderGrid();
  });
});

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => setLang(btn.dataset.lang));
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.getElementById('detailPanel').classList.contains('is-open')) closeDetail();
});

setInterval(() => {
  if (activeTruckId) renderDetail();
  renderGrid();
}, 60 * 1000);


// ============================================================
// NEW TRUCK MODAL
// ============================================================
function openNewTruckModal() {
  const inp = document.getElementById('truckNumberInput');
  inp.value = '';
  document.getElementById('modalError').style.display = 'none';
  inp.classList.remove('has-error');
  const customsSel = document.getElementById('customsSelect');
  customsSel.value = '';
  customsSel.classList.remove('has-error');
  document.getElementById('modalCustomsError').style.display = 'none';
  document.getElementById('newTruckModal').classList.add('is-open');
  setTimeout(() => inp.focus(), 100);
}
function closeAllModals() {
  document.querySelectorAll('.modal').forEach(m => m.classList.remove('is-open'));
}
async function submitNewTruck() {
  const inp = document.getElementById('truckNumberInput');
  const errEl = document.getElementById('modalError');
  const customsSel = document.getElementById('customsSelect');
  const customsErrEl = document.getElementById('modalCustomsError');
  const num = inp.value.trim();
  if (!num) {
    errEl.textContent = t('error.empty');
    errEl.style.display = 'block';
    inp.classList.add('has-error');
    return;
  }
  errEl.style.display = 'none';
  inp.classList.remove('has-error');
  if (!customsSel.value) {
    customsErrEl.textContent = t('error.noCustoms');
    customsErrEl.style.display = 'block';
    customsSel.classList.add('has-error');
    return;
  }
  customsErrEl.style.display = 'none';
  customsSel.classList.remove('has-error');

  try {
    const created = await MeridianAPI.createTruck({ number: num, customs: customsSel.value });
    trucks.unshift(created);
    closeAllModals();
    renderPills();
    renderGrid();
    showToast(t('toast.created').replace('{num}', num), 'success');
  } catch (err) {
    errEl.textContent = err.error || 'Не удалось создать заявку';
    errEl.style.display = 'block';
    inp.classList.add('has-error');
  }
}
function showToast(text, kind) {
  const stack = document.getElementById('toastStack');
  const el = document.createElement('div');
  el.className = 'toast' + (kind ? ' ' + kind : '');
  el.textContent = text;
  stack.appendChild(el);
  setTimeout(() => el.remove(), 4200);
}

document.getElementById('newTruckBtn').addEventListener('click', openNewTruckModal);
document.getElementById('submitNewTruck').addEventListener('click', submitNewTruck);
document.getElementById('truckNumberInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitNewTruck();
});
document.addEventListener('click', e => {
  const closer = e.target.closest('[data-close]');
  if (closer && closer.closest('.modal')) closeAllModals();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.querySelector('.modal.is-open')) closeAllModals();
});

// ============================================================
// BOOTSTRAP — пользователь + заявки из API
// ============================================================
async function bootstrap() {
  // Заголовок: имя клиента (login) + аватар из инициалов
  try {
    const me = await MeridianAPI.me();
    const nameEl = document.getElementById('userName');
    const avEl   = document.getElementById('userAvatar');
    if (nameEl) nameEl.textContent = me.login;
    if (avEl)   avEl.textContent   = (me.login || '?').slice(0, 2).toUpperCase();
  } catch (e) {}

  const lbtn = document.getElementById('logoutBtn');
  if (lbtn) lbtn.addEventListener('click', async () => {
    try { await MeridianAPI.logout(); } catch (e) {}
    location.href = '/login';
  });

  try {
    const list = await MeridianAPI.listTrucks();
    trucks = Array.isArray(list) ? list : [];
  } catch (e) {
    showToast(e.error || 'Не удалось загрузить заявки', 'error');
  }

  // Локализация причин проблем: бэкенд возвращает простой `reason`, оборачиваем в reasonByLang
  // (чтобы существующий рендер с getProblemReason работал без правок).
  trucks.forEach(tr => {
    if (Array.isArray(tr.problems)) {
      tr.problems.forEach(p => {
        if (p.reason && !p.reasonByLang) p.reasonByLang = { ru: p.reason, zh: p.reason };
      });
    }
  });

  renderPills();
  renderGrid();

  // Периодическое обновление
  setInterval(async () => {
    try {
      const list = await MeridianAPI.listTrucks();
      if (Array.isArray(list)) {
        trucks = list;
        trucks.forEach(tr => {
          if (Array.isArray(tr.problems)) {
            tr.problems.forEach(p => {
              if (p.reason && !p.reasonByLang) p.reasonByLang = { ru: p.reason, zh: p.reason };
            });
          }
        });
        renderPills();
        renderGrid();
        if (activeTruckId && !trucks.find(x => x.id === activeTruckId)) closeDetail();
        else if (activeTruckId) renderDetail();
      }
    } catch (e) {}
  }, 30 * 1000);
}

// Initial render — статика сразу, данные асинхронно
document.documentElement.setAttribute('lang', currentLang);
document.querySelectorAll('.lang-btn').forEach(b => {
  b.classList.toggle('is-active', b.dataset.lang === currentLang);
});
applyStaticTranslations();
renderPills();
renderGrid();
bootstrap();
</script>
