name: Deploy to DigitalOcean

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.ref }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute lowercase image name
        id: image
        run: |
          name="${{ env.REGISTRY }}/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "ref=${name}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.ref }}:latest
            ${{ steps.image.outputs.ref }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy on droplet
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            docker-compose.prod.yml
          sparse-checkout-cone-mode: false

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DO_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -T 10 -H "${{ secrets.DO_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy compose file
        run: |
          scp -i ~/.ssh/id_deploy -o ServerAliveInterval=30 \
            docker-compose.prod.yml \
            "${{ secrets.DO_USER }}@${{ secrets.DO_HOST }}:${{ secrets.DO_PATH }}/docker-compose.prod.yml"

      - name: Pull & restart
        env:
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE: ${{ needs.build.outputs.image }}
        run: |
          ssh -i ~/.ssh/id_deploy \
            -o ServerAliveInterval=30 -o ServerAliveCountMax=20 \
            "${{ secrets.DO_USER }}@${{ secrets.DO_HOST }}" \
            "set -e
             cd ${{ secrets.DO_PATH }}
             test -f .env || { echo '.env missing in ${{ secrets.DO_PATH }}'; exit 1; }
             echo '$GHCR_TOKEN' | docker login ghcr.io -u '$GHCR_USER' --password-stdin
             export IMAGE='$IMAGE:latest'
             docker compose -f docker-compose.prod.yml pull
             docker compose -f docker-compose.prod.yml up -d
             docker logout ghcr.io
             docker image prune -f"

      - name: Health check
        run: |
          ssh -i ~/.ssh/id_deploy -o ServerAliveInterval=30 \
            "${{ secrets.DO_USER }}@${{ secrets.DO_HOST }}" \
            "for i in \$(seq 1 15); do
               if curl -fsS http://localhost:3100/login > /dev/null; then
                 echo OK; exit 0
               fi
               sleep 3
             done
             echo 'health check failed'
             docker compose -f ${{ secrets.DO_PATH }}/docker-compose.prod.yml logs --tail=100
             exit 1"
